name: Build_Irium_Bridge
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Bridge via Cargo
        run: |
          # Installiamo il bridge come pacchetto binario di Rust
          # Questo evita l'uso di URL complessi nel file YAML
          cargo install kaspa-stratum-bridge --root .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: irium-bridge
          path: bin/*.exe
