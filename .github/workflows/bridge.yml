name: Build_Irium_Bridge
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Clone and Build
        shell: bash
        run: |
          git clone https://github.com
          cd irium-stratum-bridge
          cargo build --release

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: irium-bridge
          path: irium-stratum-bridge/target/release/*.
