name: Build_Irium_Bridge
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Bridge
        run: |
          # Cloniamo il bridge aggiornato direttamente qui
          git clone https://github.com
          cd kaspa-stratum-bridge
          cargo build --release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: irium-bridge
          path: kaspa-stratum-bridge/target/release/*.exe
