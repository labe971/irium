name: Build_Irium_Bridge
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download and Build
        shell: bash
        run: |
          # Assembliamo l'URL in una variabile locale per evitare il taglio del parser
          PART1="https://github.com"
          PART2="/KRS-Irium/irium-stratum-bridge/archive/refs/heads/main.zip"
          FULL_URL="${PART1}${PART2}"
          
          echo "Scaricando da: $FULL_URL"
          curl -L -o bridge.zip "$FULL_URL"
          
          unzip bridge.zip
          cd irium-stratum-bridge-main
          cargo build --release

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: irium-bridge
          path: irium-stratum-bridge-main/target/release/*.exe
