name: Build_Irium_Bridge
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download and Build
        shell: bash
        run: |
          # Usiamo il repository di elichai, che è lo standard per i bridge Rust
          git clone https://github.com
          cd kaspa-stratum-bridge
          # Lo compiliamo con il supporto SHA256 (fondamentale per Irium e il tuo Gekko)
          cargo build --release

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: irium-bridge
          path: kaspa-stratum-bridge/target/release/*.exe
