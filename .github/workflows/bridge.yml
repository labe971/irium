name: Build_Irium_Bridge
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download and Build
        run: |
          curl -L -o bridge.zip https://github.com
          tar -xf bridge.zip
          cd irium-stratum-bridge-main
          cargo build --release

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: irium-bridge
          path: irium-stratum-bridge-main/target/release/*.exe
